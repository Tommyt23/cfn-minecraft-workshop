# .github/workflows/validate.yml

name: Validate CloudFormation Template

on:
  push:
    branches:
      - main
    paths:
      - 'minecraft-server.yaml'
      - 'rules/**'
  pull_request:
    paths:
      - 'minecraft-server.yaml'
      - 'rules/**'

jobs:
  validate:
    name: Validate template
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cfn-lint
        run: pip install cfn-lint

      # --append-rules points cfn-lint at the rules/ directory.
      # Runs built-in checks AND your custom rules in one pass.
      #
      # cfn-lint exit codes:
      #   0 — no issues
      #   2 — errors found       (fail the workflow)
      #   4 — warnings only      (show them, but keep the workflow green)
      #   6 — errors + warnings  (fail the workflow)
      #
      # "|| [ $? -eq 4 ]" lets exit code 4 (warnings only) pass so that
      # W9001 (SSH CIDR open to the world) is visible in the log without
      # blocking merges. Errors still fail the workflow.
      - name: Lint template (built-in + custom rules)
        run: cfn-lint minecraft-server.yaml --append-rules rules/ || [ $? -eq 4 ]
