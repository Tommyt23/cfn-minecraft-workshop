# .github/workflows/validate.yml

name: Validate CloudFormation Template

on:
  push:
    branches:
      - main
    paths:
      - 'minecraft-server.yaml'
      - 'rules/**'
  pull_request:
    paths:
      - 'minecraft-server.yaml'
      - 'rules/**'

jobs:
  validate:
    name: Validate template
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cfn-lint
        run: pip install cfn-lint

      # --append-rules points cfn-lint at the rules/ directory.
      # Runs built-in checks AND your custom rules in one pass.
      # E rules (errors) cause a non-zero exit and fail the workflow.
      # W rules (warnings) are shown but don't fail by default.
      # To make warnings fail too, append: -W
      - name: Lint template (built-in + custom rules)
        run: cfn-lint minecraft-server.yaml --append-rules rules/
